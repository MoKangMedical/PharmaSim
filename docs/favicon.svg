<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="#0a0e1a"/>
  <g transform="translate(256,256)">
    <!-- Pill/Capsule shape -->
    <rect x="-120" y="-45" width="240" height="90" rx="45" fill="url(#g)" transform="rotate(-30)"/>
    <rect x="-120" y="-45" width="120" height="90" rx="45" fill="#06b6d4" opacity="0.9" transform="rotate(-30)"/>
    <!-- Divider line -->
    <line x1="-2" y1="-60" x2="2" y2="60" stroke="#0a0e1a" stroke-width="6" transform="rotate(-30)"/>
    <!-- Network nodes -->
    <circle cx="-60" cy="80" r="12" fill="#06b6d4" opacity="0.8"/>
    <circle cx="60" cy="80" r="12" fill="#8b5cf6" opacity="0.8"/>
    <circle cx="0" cy="100" r="10" fill="#10b981" opacity="0.8"/>
    <circle cx="-30" cy="110" r="8" fill="#f59e0b" opacity="0.6"/>
    <circle cx="30" cy="110" r="8" fill="#ec4899" opacity="0.6"/>
    <!-- Network connections -->
    <line x1="-60" y1="80" x2="60" y2="80" stroke="#64748b" stroke-width="2" opacity="0.5"/>
    <line x1="-60" y1="80" x2="0" y2="100" stroke="#64748b" stroke-width="2" opacity="0.5"/>
    <line x1="60" y1="80" x2="0" y2="100" stroke="#64748b" stroke-width="2" opacity="0.5"/>
    <line x1="-30" y1="110" x2="30" y2="110" stroke="#64748b" stroke-width="1.5" opacity="0.4"/>
    <line x1="-60" y1="80" x2="-30" y2="110" stroke="#64748b" stroke-width="1.5" opacity="0.4"/>
    <line x1="60" y1="80" x2="30" y2="110" stroke="#64748b" stroke-width="1.5" opacity="0.4"/>
  </g>
</svg>