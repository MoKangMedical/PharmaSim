*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#0a0a1e;color:#e2e8f0;line-height:1.6}
.hero{padding:8rem 2rem 4rem;text-align:center;background:linear-gradient(135deg,#6366f122,#0a0a1e)}
.hero h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#818cf8,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{color:rgba(255,255,255,0.6);margin-top:1rem;font-size:1.1rem}
.plans{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:2rem;max-width:960px;margin:0 auto;padding:4rem 2rem}
.plan{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:2.5rem;text-align:center;position:relative;transition:all .3s}
.plan:hover{transform:translateY(-4px);border-color:#6366f1}
.plan.popular{border-color:#6366f1;background:rgba(99,102,241,0.08)}
.badge{position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;padding:4px 20px;border-radius:20px;font-size:.8rem;font-weight:600}
.plan h3{font-size:1.3rem;margin-bottom:.5rem}
.price{font-size:2.2rem;font-weight:800;color:#fff;margin:1rem 0}
.plan ul{list-style:none;text-align:left;margin:1.5rem 0}
.plan ul li{padding:.5rem 0;color:rgba(255,255,255,0.7);font-size:.9rem;border-bottom:1px solid rgba(255,255,255,0.05)}
.plan ul li::before{content:"✓ ";color:#10b981;font-weight:700}
.btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:1rem;font-weight:600;cursor:pointer;transition:all .3s;background:rgba(255,255,255,0.1);color:#fff}
.plan.popular .btn{background:linear-gradient(135deg,#6366f1,#8b5cf6)}
.btn:hover{transform:translateY(-2px)}
footer{background:rgba(0,0,0,0.3);border-top:1px solid rgba(255,255,255,0.08);padding:2rem;text-align:center}
</style>
