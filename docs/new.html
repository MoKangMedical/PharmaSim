<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PharmaSim - AI药品上市预测仿真平台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f172a;--card:#1e293b;--card2:#162032;--text:#e2e8f0;--dim:#94a3b8;--border:#334155;--cyan:#06b6d4;--blue:#3b82f6;--green:#10b981;--purple:#8b5cf6;--orange:#f59e0b;--red:#ef4444;--pink:#ec4899;--yellow:#eab308}
body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,sans-serif;min-height:100vh}
a{color:var(--cyan);text-decoration:none}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(15,23,42,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:.7rem 2rem;display:flex;align-items:center}
nav .logo{font-weight:800;font-size:1.2rem;cursor:pointer}
nav .logo span{background:linear-gradient(135deg,var(--cyan),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
nav .tabs{margin-left:2rem;display:flex;gap:.3rem}
nav .tab{padding:.4rem 1rem;border-radius:8px;font-size:.85rem;cursor:pointer;color:var(--dim);transition:all .3s;border:none;background:none}
nav .tab:hover{color:var(--text);background:rgba(255,255,255,.05)}
nav .tab.active{color:var(--cyan);background:rgba(6,182,212,.1)}

/* PAGES */
.page{display:none;padding:5rem 2rem 3rem;max-width:1400px;margin:0 auto;animation:fadeIn .4s ease}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
h1{font-size:2rem;font-weight:800;margin-bottom:.3rem}
h2{font-size:1.6rem;font-weight:700;margin-bottom:.5rem}
.desc{color:var(--dim);margin-bottom:1.5rem;font-size:.95rem}

/* DRUG GRID */
.drug-filters{display:flex;gap:.8rem;flex-wrap:wrap;margin-bottom:1.5rem}
.drug-filters button{padding:.5rem 1rem;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--dim);cursor:pointer;font-size:.85rem;transition:all .3s}
.drug-filters button:hover,.drug-filters button.active{border-color:var(--cyan);color:var(--cyan);background:rgba(6,182,212,.08)}
.search-box{width:100%;padding:.7rem 1rem;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:.95rem;margin-bottom:1.5rem;outline:none}
.search-box:focus{border-color:var(--cyan)}
.drug-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1rem}
.drug-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.2rem;cursor:pointer;transition:all .3s;position:relative;overflow:hidden}
.drug-card:hover{transform:translateY(-3px);border-color:var(--cyan);box-shadow:0 8px 25px rgba(0,0,0,.2)}
.drug-card .dc-category{font-size:.7rem;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:.4rem}
.drug-card .dc-name{font-size:1.1rem;font-weight:700;margin-bottom:.2rem}
.drug-card .dc-generic{font-size:.85rem;color:var(--dim);margin-bottom:.6rem}
.drug-card .dc-tags{display:flex;flex-wrap:wrap;gap:.3rem}
.drug-card .dc-tag{font-size:.7rem;padding:.15rem .4rem;border-radius:5px;background:rgba(255,255,255,.05);border:1px solid var(--border)}
.drug-card .dc-status{position:absolute;top:1rem;right:1rem;font-size:.7rem;padding:.2rem .5rem;border-radius:6px;font-weight:600}
.drug-card .dc-fda{background:rgba(16,185,129,.15);color:#10b981}
.drug-card .dc-china{background:rgba(245,158,11,.15);color:#f59e0b}
.drug-card .dc-select{margin-top:.8rem;padding:.4rem 0;border-radius:6px;background:var(--cyan);color:#fff;border:none;width:100%;font-size:.85rem;font-weight:600;cursor:pointer;opacity:0;transition:opacity .3s}
.drug-card:hover .dc-select{opacity:1}

/* CONFIG PAGE */
.config-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}
@media(max-width:800px){.config-grid{grid-template-columns:1fr}}
.config-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.5rem}
.config-card h3{font-size:1rem;margin-bottom:1rem;color:var(--cyan)}
.config-row{display:flex;justify-content:space-between;align-items:center;padding:.5rem 0;border-bottom:1px solid rgba(255,255,255,.03)}
.config-row label{font-size:.9rem;color:var(--dim)}
.config-row input,.config-row select{padding:.4rem .6rem;border-radius:6px;border:1px solid var(--border);background:var(--card2);color:var(--text);font-size:.85rem;width:180px}
.config-row select{cursor:pointer}
.sim-btn{display:block;width:100%;padding:1rem;border-radius:12px;border:none;background:linear-gradient(135deg,var(--cyan),var(--purple));color:#fff;font-size:1.1rem;font-weight:700;cursor:pointer;margin-top:2rem;transition:all .3s}
.sim-btn:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(6,182,212,.3)}
.sim-btn:disabled{opacity:.5;cursor:not-allowed}

/* RESULTS */
.results-summary{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:1rem;margin-bottom:2rem}
.rs-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.2rem;text-align:center}
.rs-card .rs-val{font-size:1.8rem;font-weight:800;margin:.3rem 0}
.rs-card .rs-lbl{font-size:.8rem;color:var(--dim)}

/* EXPERT CARDS */
.expert-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1rem;margin:1.5rem 0}
.expert-chip{background:var(--card);border:2px solid var(--border);border-radius:14px;padding:1rem;text-align:center;cursor:pointer;transition:all .3s}
.expert-chip:hover{transform:translateY(-4px);border-color:var(--ec)}
.expert-chip .ec-emoji{font-size:2rem;margin-bottom:.5rem;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.expert-chip .ec-name{font-size:.85rem;font-weight:600;margin-bottom:.2rem}
.expert-chip .ec-score{font-size:1.8rem;font-weight:900}
.expert-chip .ec-bar{height:4px;background:var(--border);border-radius:2px;margin:.4rem 0;overflow:hidden}
.expert-chip .ec-bar div{height:100%;border-radius:2px;transition:width 1.5s}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:200;display:none;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:18px;max-width:850px;width:95%;max-height:85vh;overflow-y:auto;position:relative}
.modal .mx{position:absolute;top:1rem;right:1rem;background:none;border:none;color:var(--dim);font-size:1.3rem;cursor:pointer;z-index:5}
.modal-head{padding:1.5rem 2rem 1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:1rem}
.modal-head .mh-icon{font-size:2.5rem}
.modal-body{padding:1.5rem 2rem 2rem}
.m-section{margin-bottom:1.5rem}
.m-section h4{font-size:.85rem;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:.6rem}
.m-row{display:flex;justify-content:space-between;padding:.3rem 0;font-size:.85rem;border-bottom:1px solid rgba(255,255,255,.03)}
.m-stance{padding:.6rem .8rem;border-radius:8px;font-size:.82rem;line-height:1.5;margin:.4rem 0}
.m-dims{display:flex;flex-wrap:wrap;gap:.3rem;margin-top:.4rem}
.m-dims span{font-size:.7rem;padding:.15rem .4rem;border-radius:5px;border:1px solid var(--border)}

/* PARTICLE */
.particle-wrap{position:relative;height:500px;border-radius:16px;overflow:hidden;background:var(--card);border:1px solid var(--border);margin:1.5rem 0}
.particle-wrap canvas{width:100%;height:100%;cursor:crosshair}
.p-legend{position:absolute;bottom:.8rem;left:.8rem;display:flex;gap:.6rem;flex-wrap:wrap;z-index:2}
.p-legend span{display:flex;align-items:center;gap:.3rem;font-size:.7rem;background:rgba(0,0,0,.5);padding:.2rem .5rem;border-radius:12px}
.p-legend .dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.p-hint{position:absolute;top:.8rem;left:.8rem;font-size:.75rem;color:var(--dim);background:rgba(0,0,0,.4);padding:.2rem .6rem;border-radius:8px;z-index:2}

/* PANEL */
.panel{position:fixed;top:0;right:-400px;width:380px;height:100vh;background:var(--card);border-left:1px solid var(--border);z-index:150;transition:right .35s ease;overflow-y:auto;box-shadow:-6px 0 25px rgba(0,0,0,.3)}
.panel.open{right:0}
.panel .px{position:absolute;top:1rem;right:1rem;background:none;border:none;color:var(--dim);font-size:1.1rem;cursor:pointer}
.panel-head{padding:1.2rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.8rem}
.panel-head .ph-av{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.8rem;flex-shrink:0}
.panel-body{padding:1rem 1.2rem}

/* CHART */
.chart-box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.2rem;margin:1.5rem 0}

/* CLUSTER */
.cluster-row{display:flex;gap:1.5rem;flex-wrap:wrap;justify-content:center;margin:1.5rem 0}
.cluster-item{text-align:center;flex:1;min-width:140px}
.cluster-item .ci-ring{width:90px;height:90px;margin:0 auto .5rem;position:relative;display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:800}
.cluster-item .ci-ring svg{position:absolute;inset:0;transform:rotate(-90deg)}
.cluster-item .ci-ring svg circle{fill:none;stroke-width:5;stroke-linecap:round}
