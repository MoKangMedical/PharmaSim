# PharmaSim Video System Configuration
# 视频和语音能力系统配置

video:
  name: "PharmaSim_Promo"
  duration: 60  # 秒
  resolution: "1920x1080"
  fps: 60
  background_color: "#0A0E1A"

scenes:
  - name: "Scene1_Title"
    duration: 5.0
    description: "标题揭示：粒子网络背景"
    
  - name: "Scene2_Problem"
    duration: 7.0
    description: "问题陈述：90%药物上市失败"
    
  - name: "Scene3_Solution"
    duration: 10.0
    description: "解决方案：1,801个AI智能体模拟"
    
  - name: "Scene4_AgentTypes"
    duration: 10.0
    description: "智能体类型：医生、患者、专家网络"
    
  - name: "Scene5_Evaluation"
    duration: 10.0
    description: "7维度专家评估雷达图"
    
  - name: "Scene6_Results"
    duration: 8.0
    description: "24个月市场预测"
    
  - name: "Scene7_Stats"
    duration: 5.0
    description: "关键统计数据"
    
  - name: "Scene8_CTA"
    duration: 5.0
    description: "行动号召：访问网站"

voices:
  primary:
    id: "en-US-GuyNeural"
    name: "Guy (US Male)"
    style: "Deep, authoritative"
    rate: "-5%"
    pitch: "-2Hz"
    
  alternatives:
    - id: "en-US-JennyNeural"
      name: "Jenny (US Female)"
      style: "Clear, professional"
      
    - id: "en-GB-RyanNeural"
      name: "Ryan (British Male)"
      style: "Documentary, science"
      
    - id: "en-US-AriaNeural"
      name: "Aria (US Female)"
      style: "Expressive, warm"

narration:
  scene1: "PharmaSim. AI-Powered Drug Launch Simulation."
  scene2: "Ninety percent of drug launches underperform expectations. Why? Unclear market dynamics. Unpredictable physician behavior. Complex insurance negotiations. Patient adoption uncertainty."
  scene3: "What if you could simulate the entire market... before you launch? One thousand, eight hundred and one AI agents. Each with unique behaviors. Each making real decisions."
  scene4: "Four hundred doctors. One thousand patients. Four hundred experts across seven domains. Connected through a Watts-Strogatz social network. Simulating real peer influence, KOL effects, and insurance negotiations."
  scene5: "Seven dimensions. Twenty-eight sub-dimensions. Epidemiology. Clinical. Market. Pricing. Pharmacology. Pharmacoeconomics. Insurance. Every angle, evaluated."
  scene6: "Twenty-four month forecasts with Monte Carlo confidence intervals. Peak prescription volumes. Revenue curves. Market penetration. Before you spend a single dollar."
  scene7: "One thousand eight hundred and one agents. Seven expert dimensions. Forty-four plus FDA drugs. Ninety-five percent prediction accuracy."
  scene8: "PharmaSim. Predict drug launch success. Visit mokangmedical.github.io/PharmaSim."

music:
  ambient:
    enabled: true
    type: "procedural"
    frequencies: [130.81, 164.81, 196.00]  # C3, E3, G3
    duration: 65
    volume: 0.15
    fade_in: 3
    fade_out: 4
    
  cinematic:
    enabled: true
    type: "enhanced"
    frequencies: [130.81, 164.81, 196.00, 261.63]  # C3, E3, G3, C4
    duration: 65
    volume: 0.12
    fade_in: 3
    fade_out: 4
    echo: "40|60:0.25|0.15"

mixing:
  voice_volume: 2.5
  music_volume: 0.15
  voice_delay: 1500  # ms
  normalize: true

output:
  draft: "output/draft.mp4"
  final: "output/PharmaSim_Promo_Final.mp4"
  audio_only: "output/final_audio.mp3"

tts:
  provider: "edge-tts"
  retry_attempts: 3
  retry_delay: 2
  batch_delay: 1
  proxy: "socks5://127.0.0.1:7890"  # 如果需要的话

ffmpeg:
  video_codec: "libx264"
  audio_codec: "aac"
  audio_bitrate: "192k"
  pixel_format: "yuv420p"
  preset: "medium"
  crf: 18